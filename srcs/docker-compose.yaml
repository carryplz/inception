services:
  mariadb:
    container_name: mariadb
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    image: mariadb:injo
    volumes:
      - mariadb:/var/lib/mysql
    networks:
      - inception
    env_file:
      - .env
    secrets:
      - db_root_password
      - db_password
    restart: always

  wordpress:
    container_name: wordpress
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    image: wordpress:injo
    depends_on:
      - mariadb
      - redis
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    env_file:
      - .env
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password
    restart: always

  nginx:
    container_name: nginx
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    image: nginx:injo
    depends_on:
      - wordpress
    ports:
      - "443:443"
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    env_file:
      - .env
    restart: always

  redis:
    container_name: redis
    build:
      context: ./requirements/redis
      dockerfile: Dockerfile
    image: redis:injo
    networks:
      - inception
    restart: always

  adminer:
    container_name: adminer
    build:
      context: ./requirements/adminer
      dockerfile: Dockerfile
    image: adminer:injo
    depends_on:
      - mariadb
    ports:
      - "8080:8080"
    networks:
      - inception
    restart: always

  netdata:
    container_name: netdata
    build:
      context: ./requirements/netdata
      dockerfile: Dockerfile
    image: netdata:injo
    ports:
      - "19999:19999"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - inception
    restart: always
    
  static:
    container_name: static
    build:
      context: ./requirements/static
      dockerfile: Dockerfile
    image: static:injo
    ports:
      - "80:80"
    networks:
      - inception
    restart: always
  
  ftp:
    container_name: ftp
    build:
      context: ./requirements/ftp
      dockerfile: Dockerfile
    image: ftp:injo
    depends_on:
      - wordpress
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    env_file:
      - .env
    secrets:
      - ftp_password
    restart: always

secrets:
  db_root_password:
    file: ../secrets/db_root_pw.txt
  db_password:
    file: ../secrets/db_pw.txt
  wp_admin_password:
    file: ../secrets/wp_admin_pw.txt
  wp_user_password:
    file: ../secrets/wp_user_pw.txt
  ftp_password:
    file: ../secrets/ftp_pw.txt

volumes:
  wordpress:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/injo/data/wordpress'
  mariadb:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/injo/data/mariadb'

networks:
  inception:
    driver: bridge